apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-notes-app
  namespace: cloud-notes
  labels:
    app: cloud-notes-app
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: cloud-notes-app
  template:
    metadata:
      labels:
        app: cloud-notes-app
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: cloud-notes-app
          image: docker.io/your-dockerhub-username/cloud-notes-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: cloud-notes-config
            - secretRef:
                name: cloud-notes-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
